name: Docker

# Builds and publishes the github-sdlc-planning MCP server as a container
# image (ghcr.io/modeled-information-format/gdlc-planning-mcp), required
# because gh-aw's MCP Gateway rejects bare `command: node` stdio servers —
# custom MCP servers must be containerized or served over HTTP. Consumed by
# .github/workflows/sprint-milestone-digest.md's mcp-servers config.
#
# Manual prerequisite, not automatable here (same category as
# live-integration-tests.yml's ISSUES_CLIENT_APP secrets): a GHCR package
# created via GITHUB_TOKEN defaults to PRIVATE, and GitHub's REST/GraphQL API
# has no mutation for package visibility (confirmed empirically — only
# GET/DELETE/POST-restore exist for any auth type, including App tokens).
# gh-aw's own mcp-servers `container:` field is a plain string with no
# registry-credentials mechanism anywhere in its schema (verified against
# github/gh-aw's actual main_workflow_schema.json, not assumed), so there is
# no in-frontmatter way to authenticate a private pull either. After this
# workflow's first run, flip the "gdlc-planning-mcp" package to Public via
# the repo's Packages settings in the web UI — the sprint-milestone-digest
# workflow's image pull will otherwise fail.

"on":
  push:
    branches: [main]
    paths:
      - plugins/github-sdlc-planning/mcp-server/**
      # Issue #147: the mcp-server's package.json depends on this package via
      # a file: reference, so a change here must rebuild the image too, not
      # only be caught the next time the mcp-server's own files change.
      - packages/singleflight-cache/**
      # The build context is now the repo root, so a change to what it
      # excludes is itself a build-relevant change (Copilot review finding).
      - .dockerignore
      - .github/workflows/docker-publish.yml
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: modeled-information-format/gdlc-planning-mcp

permissions:
  contents: read

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # Login must precede Buildx setup so the BuildKit builder image is
      # pulled with credentials, not anonymously.
      - name: Log in to Container Registry
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          # Issue #147: the mcp-server's package.json depends on
          # @github-sdlc-plugins/singleflight-cache via
          # file:../../../packages/singleflight-cache, a monorepo-relative
          # path that resolves outside a build context scoped to the
          # mcp-server's own directory. The context is the repo root so
          # that dependency is actually present to COPY; `file:` points
          # back at the Dockerfile, which still lives alongside the
          # service it builds.
          context: .
          file: plugins/github-sdlc-planning/mcp-server/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # A first push to a brand-new GHCR package can 403 on the blob
          # HEAD check under BuildKit's default provenance attestation
          # (confirmed on mif-rs) — disabled explicitly rather than risking
          # the same failure on this package's first publish.
          provenance: false
