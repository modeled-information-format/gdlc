---
name: quality-gates

# Merge-time quality gates for the plugin marketplace — thin callers of the
# central modeled-information-format/.github reusables (pinned by full commit
# SHA, re-resolved 2026-07-03), plus this repo's own build/test/lint gates for
# the two vendored TypeScript MCP servers. Every scanning gate normalizes on
# SARIF and surfaces in the Security tab; wire "Code scanning results" as a
# required check to make it the merge gate.
#
# The plugin-constituent scan map (research Pillar 2): ShellCheck over hook
# scripts, Semgrep over MCP/bundled source, secret scanning (Gitleaks +
# TruffleHog) over everything, manifest review over the catalog/manifests,
# plus the org-standard SAST(actions)/SCA(OSV)/Trivy/Scorecard. A
# marketplace-validate job runs the canonical `claude plugin validate`.
#
# test-planning-mcp-server MUST complete before test-pull-requests-mcp-server
# starts: github-pull-requests-mcp-server's file: dependency on
# github-sdlc-planning-mcp-server resolves at npm-install time to whatever is
# on disk, and its own typecheck/build needs the sibling's dist/mif.d.ts and
# dist/mif.js already built.
#
# test-singleflight-cache MUST complete before test-planning-mcp-server and
# test-org-identity-mcp-server start, for the same reason: both carry a
# file: dependency on packages/singleflight-cache (gdlc#130) and need its
# dist/index.js + dist/index.d.ts already built.

"on":
  push:
    branches: [main]
  # No branches filter: matches catalog-admission.yml's own convention, and
  # lets stacked PRs (base = another feature branch, not main) still get the
  # real test/lint/build/coverage/SAST gates instead of only catalog-admission
  # and Copilot. A PR targeting main behaves exactly as before.
  pull_request:
  schedule:
    - cron: "37 8 * * 1"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # --- org-standard gates (central reusables) ---------------------------
  sast:
    permissions:
      security-events: write
      contents: read
      actions: read
      packages: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@e9e93cd50943a5ec3a9ad4ce8bb52f2fd29814fc
    with:
      languages: actions
      build-mode: none

  sca:
    permissions:
      actions: read
      contents: read
      security-events: write
      pull-requests: write
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      fail-on-severity: high

  trivy:
    permissions:
      contents: read
      security-events: write
      actions: read
      packages: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-trivy.yml@e9e93cd50943a5ec3a9ad4ce8bb52f2fd29814fc
    with:
      scan-iac: true

  posture:
    if: github.event_name == 'push' || github.event_name == 'schedule'
    permissions:
      security-events: write
      id-token: write
      contents: read
      actions: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-scorecard.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      publish-results: false
    secrets:
      # CI app key so Scorecard scores Branch-Protection from real settings;
      # its client-id is vars.CI_CLIENT_APP_ID (read inside the reusable).
      # Manual prerequisite: unset until the CI GitHub App is provisioned —
      # this job then no-ops rather than failing the run (see step 14 of the
      # build plan / SECURITY.md).
      app-private-key: ${{ secrets.CI_CLIENT_APP_PRIVATE_KEY }}

  # --- plugin-constituent gates (central reusables) ----------------------
  shellcheck:
    permissions:
      contents: read
      security-events: write
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-shellcheck.yml@e9e93cd50943a5ec3a9ad4ce8bb52f2fd29814fc
  semgrep:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-semgrep.yml@eb961149b0cbdb2b5b839c2ea85c14a52d830216
    with:
      directory: .
  secrets:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-secrets.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      directory: .
  manifest-review:
    permissions:
      contents: read
      security-events: write
      actions: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-manifest-review.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      directory: .

  # --- canonical marketplace validation (claude CLI; don't reinvent) -----
  marketplace-validate:
    name: marketplace-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install Claude Code CLI (pinned)
        env:
          CLAUDE_VERSION: 2.1.199
        run: npm install -g "@anthropic-ai/claude-code@${CLAUDE_VERSION}"
      - name: Validate marketplace + plugin manifests
        run: claude plugin validate .

  # --- build/test/lint gates for the vendored MCP servers -----------------
  test-singleflight-cache:
    name: test (packages/singleflight-cache)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: packages/singleflight-cache
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: packages/singleflight-cache/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run build
      - run: npm run test:coverage
      - name: Committed dist/ must match a fresh build
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::packages/singleflight-cache/dist/ is stale — run 'npm run build' and commit the result."
            exit 1
          fi

  test-planning-mcp-server:
    name: test (github-sdlc-planning/mcp-server)
    needs: [test-singleflight-cache]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            packages/singleflight-cache/package-lock.json
            plugins/github-sdlc-planning/mcp-server/package-lock.json
      - name: Build the sibling package's dist/ (the file dependency needs it)
        working-directory: packages/singleflight-cache
        run: npm ci && npm run build
      - name: Install, typecheck, lint, build, test
        working-directory: plugins/github-sdlc-planning/mcp-server
        run: |
          npm ci
          npm run typecheck
          npm run lint
          npm run build
          npm run test:coverage
      - name: Committed dist/ must match a fresh build
        working-directory: plugins/github-sdlc-planning/mcp-server
        # Claude Code installs plugins from git source with no build step —
        # dist/ is the actual runtime artifact, not a derived/ignored one. A
        # src/ change committed without rebuilding dist/ would silently ship
        # stale code, so this fails the gate instead.
        run: |
          if ! git diff --exit-code -- dist/; then
            echo "::error::plugins/github-sdlc-planning/mcp-server/dist/ is stale — run 'npm run build' and commit the result."
            exit 1
          fi

  test-pull-requests-mcp-server:
    name: test (github-pull-requests/mcp-server)
    needs: [test-planning-mcp-server]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
