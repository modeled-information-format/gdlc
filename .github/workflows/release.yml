---
name: Release

# Attested delivery pipeline for the github-sdlc-plugins marketplace.
#
# Flow: build both MCP servers -> build marketplace tarball ->
#       attest-build-provenance -> CycloneDX SBOM -> seam-attest each gate
#       verdict (SAST/SCA/IaC-license + ShellCheck/Semgrep/secrets/manifest)
#       bound to the tarball digest -> cosign keyless-sign the
#       marketplace.json catalog -> OpenVEX -> fail-closed verify ->
#       tag-gated publish.
#
# The invariant: nothing publishes unless it is byte-identical to what was
# validated and carries provenance + SBOM + gate-verdict attestations (and a
# signed catalog) that re-verify. A tag publishes nothing unattested.
#
# Dry-run: workflow_dispatch exercises the full build -> attest -> verify
# chain; publish is tag-gated and skipped.

"on":
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  meta:
    name: Resolve Metadata
    runs-on: ubuntu-latest
    outputs:
      name: ${{ steps.meta.outputs.name }}
      version: ${{ steps.meta.outputs.version }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Resolve artifact name and version
        id: meta
        run: |
          set -euo pipefail
          NAME="${GITHUB_REPOSITORY##*/}"
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF#refs/tags/v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "name=${NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved: ${NAME} ${VERSION}"

  build:
    name: Build Artifact
    needs: [meta]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    outputs:
      subject-name: ${{ steps.subject.outputs.name }}
      subject-digest: ${{ steps.subject.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (lts/*)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 'lts/*'
      - name: Build github-sdlc-planning/mcp-server
        working-directory: plugins/github-sdlc-planning/mcp-server
        run: |
          npm ci
          npm run build
          if ! git diff --exit-code -- dist/; then
            echo "::error::committed dist/ does not match a fresh build — release blocked"
            exit 1
          fi
      - name: Build github-pull-requests/mcp-server
        working-directory: plugins/github-pull-requests/mcp-server
        run: |
          npm ci
          npm run build
          if ! git diff --exit-code -- dist/; then
            echo "::error::committed dist/ does not match a fresh build — release blocked"
            exit 1
          fi
      - name: Build marketplace tarball
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          mkdir -p dist
          git archive --format=tar.gz --prefix="${NAME}-${VERSION}/" \
            -o "dist/${NAME}-${VERSION}.tar.gz" "${GITHUB_SHA}"
          echo "Built: dist/${NAME}-${VERSION}.tar.gz"
          sha256sum dist/*
      - name: Record subject (name + digest) for the seam
        id: subject
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          FILE="${NAME}-${VERSION}.tar.gz"
          DIGEST=$(sha256sum "dist/${FILE}" | cut -d' ' -f1)
          echo "name=${FILE}" >> "$GITHUB_OUTPUT"
          echo "digest=sha256:${DIGEST}" >> "$GITHUB_OUTPUT"
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/*
      - name: Upload build artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist/*
          if-no-files-found: error

  sbom:
    name: SBOM (generate + attest)
    needs: [meta, build]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Download build artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-dist
          path: dist
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0
        with:
          path: .
          format: cyclonedx-json
          output-file: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Attest SBOM
        uses: actions/attest-sbom@c604332985a26aa8cf1bdc465b92731239ec6b9e # v4.1.0
        with:
          subject-path: dist/*
          sbom-path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
      - name: Upload SBOM artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom
          path: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-sbom.cdx.json
          if-no-files-found: error

  # --- gate jobs (central modeled-information-format/.github reusables, SHA-pinned) ----
  gate-sast:
    needs: [meta]
    permissions: { security-events: write, contents: read, actions: read, packages: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sast-codeql.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with: { languages: actions, build-mode: none }
  gate-sca:
    needs: [meta]
    permissions: { actions: read, contents: read, security-events: write, pull-requests: write }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-sca-osv.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with: { fail-on-severity: high }
  gate-trivy:
    needs: [meta]
    permissions: { contents: read, security-events: write, actions: read, packages: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-trivy.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with: { scan-iac: true }
  gate-shellcheck:
    needs: [meta]
    permissions: { contents: read, security-events: write }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-shellcheck.yml@e9e93cd50943a5ec3a9ad4ce8bb52f2fd29814fc
  gate-semgrep:
    needs: [meta]
    permissions: { contents: read, security-events: write, actions: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-semgrep.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
  gate-secrets:
    needs: [meta]
    permissions: { contents: read, security-events: write, actions: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-secrets.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
  gate-manifest:
    needs: [meta]
    permissions: { contents: read, security-events: write, actions: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-manifest-review.yml@7c56346c4bc47b15f08d44889116486583a1a7ac

  # --- seam attestations: bind each verdict to the tarball digest -------------
  attest-sast:
    needs: [meta, build, gate-sast]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sast/v1
      predicate-artifact: ${{ needs.gate-sast.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sast.outputs.sarif-filename }}
  attest-sca:
    needs: [meta, build, gate-sca]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/sca/v1
      predicate-artifact: ${{ needs.gate-sca.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-sca.outputs.sarif-filename }}
  attest-iac-license:
    needs: [meta, build, gate-trivy]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/iac-license/v1
      predicate-artifact: ${{ needs.gate-trivy.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-trivy.outputs.sarif-filename }}
  attest-shellcheck:
    needs: [meta, build, gate-shellcheck]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/shellcheck/v1
      predicate-artifact: ${{ needs.gate-shellcheck.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-shellcheck.outputs.sarif-filename }}
  attest-semgrep:
    needs: [meta, build, gate-semgrep]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/semgrep/v1
      predicate-artifact: ${{ needs.gate-semgrep.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-semgrep.outputs.sarif-filename }}
  attest-secrets:
    needs: [meta, build, gate-secrets]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/secrets/v1
      predicate-artifact: ${{ needs.gate-secrets.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-secrets.outputs.sarif-filename }}
  attest-manifest:
    needs: [meta, build, gate-manifest]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      predicate-type: https://modeled-information-format.github.io/attestations/manifest/v1
      predicate-artifact: ${{ needs.gate-manifest.outputs.sarif-artifact }}
      predicate-filename: ${{ needs.gate-manifest.outputs.sarif-filename }}

  # --- cosign keyless sign the marketplace.json catalog blob ------------------
  sign-catalog:
    needs: [meta]
    permissions: { id-token: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-cosign-sign.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      blob-path: .claude-plugin/marketplace.json

  # --- OpenVEX disposition ----------------------------------------------------
  vex:
    needs: [meta, build]
    permissions: { id-token: write, attestations: write, contents: read }
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-vex.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      subject-name: ${{ needs.build.outputs.subject-name }}
      subject-digest: ${{ needs.build.outputs.subject-digest }}
      vex-path: .vex/openvex.json

  # --- fail-closed verification (MUST pass before publish) --------------------
  verify:
    name: Verify Attestations (fail-closed)
    needs: [meta, build, sbom, attest-sast, attest-sca, attest-iac-license,
            attest-shellcheck, attest-semgrep, attest-secrets, attest-manifest,
            sign-catalog, vex]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Install cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: all-artifacts
          merge-multiple: true
      - name: Download cosign bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cosign-bundle
          path: catalog-sig
      - name: Fail-closed attestation + catalog-signature verification
        env:
          GH_TOKEN: ${{ github.token }}
          OWNER: ${{ github.repository_owner }}
          SEAM: modeled-information-format/.github/.github/workflows/reusable-attest-scan.yml
          VEX_SIGNER: modeled-information-format/.github/.github/workflows/reusable-vex.yml
          # The catalog's keyless signer is the cosign-sign reusable (not
          # this repo); consume the identity it reported rather than
          # hardcoding it here.
          CATALOG_SIGNER_ID: ${{ needs.sign-catalog.outputs.certificate-identity }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          artifacts=()
          for f in all-artifacts/*; do
            case "$f" in *-sbom.cdx.json) continue ;; *) artifacts+=("$f") ;; esac
          done
          if [ "${#artifacts[@]}" -eq 0 ]; then echo "::error::no artifacts"; exit 1; fi
          for artifact in "${artifacts[@]}"; do
            echo "=== Verifying: ${artifact} ==="
            gh attestation verify "${artifact}" --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://slsa.dev/provenance/v1"
            gh attestation verify "${artifact}" --repo "${GITHUB_REPOSITORY}" \
              --predicate-type "https://cyclonedx.org/bom"
            for pt in sast sca iac-license shellcheck semgrep secrets manifest; do
              gh attestation verify "${artifact}" --owner "${OWNER}" \
                --signer-workflow "${SEAM}" \
                --predicate-type "https://modeled-information-format.github.io/attestations/${pt}/v1"
              echo "  PASS: ${pt}"
            done
            gh attestation verify "${artifact}" --owner "${OWNER}" \
              --signer-workflow "${VEX_SIGNER}" \
              --predicate-type "https://openvex.dev/ns/v0.2.0"
            echo "  PASS: VEX"
          done
          echo "=== Verifying catalog signature (cosign) ==="
          cosign verify-blob .claude-plugin/marketplace.json \
            --bundle catalog-sig/marketplace.json.cosign.bundle \
            --certificate-identity-regexp "${CATALOG_SIGNER_ID}" \
            --certificate-oidc-issuer "https://token.actions.githubusercontent.com"
          echo "All attestations + catalog signature verified."

  publish:
    name: Publish Release
    if: startsWith(github.ref, 'refs/tags/')
    needs: [meta, verify, sign-catalog]
    runs-on: ubuntu-latest
    permissions:
      contents: read  # release creation uses the release App token
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: ${{ needs.meta.outputs.name }}-${{ needs.meta.outputs.version }}-*
          path: dist
          merge-multiple: true
      - name: Download cosign bundle
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: cosign-bundle
          path: dist
      - name: Generate checksums
        env:
          NAME: ${{ needs.meta.outputs.name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          cd dist
          sha256sum -- * > "${NAME}-${VERSION}-checksums.txt"
          cat "${NAME}-${VERSION}-checksums.txt"
      - name: Mint release app token (publish identity)
        id: release_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_CLIENT_APP_ID }}
          private-key: ${{ secrets.RELEASE_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}
          repositories: ${{ github.event.repository.name }}

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ steps.release_token.outputs.token }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail
          PRERELEASE=()
          case "${GITHUB_REF_NAME}" in *-*) PRERELEASE=(--prerelease) ;; esac
          gh release create "${GITHUB_REF_NAME}" dist/* \
            --repo "${GITHUB_REPOSITORY}" --title "Release ${VERSION}" \
            --generate-notes "${PRERELEASE[@]}"
