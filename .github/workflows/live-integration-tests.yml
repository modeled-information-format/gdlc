---
name: live-integration-tests

# live-verify: exercises github-sdlc-planning + github-pull-requests
# against a real sandbox repo (modeled-information-format/gdlc-sandbox),
# not mocks. Not part of the CI-gating quality-gates.yml — this mutates
# real GitHub state (issues, sub-issues, milestones, discussions, a
# throwaway Projects v2 board, a PR), so it runs on-demand only
# (workflow_dispatch), never on every push/PR.
#
# Needs the ISSUES_CLIENT_APP_ID/ISSUES_CLIENT_APP_PRIVATE_KEY secrets — see
# auth/apps.json's "issues" role in modeled-information-format/.github. This
# job fails until that App exists and those secrets are set (manual
# prerequisite; not automatable here).
#
# github-pull-requests' request_review/remove_review_request path only runs
# when SANDBOX_REVIEWER_LOGIN is set to a real org member other than the App
# — set it as a workflow input or repo variable; the run skips that check
# gracefully otherwise (see scripts/verify-live.ts in each package).
#
# live-verify-packages: exercises github-packages' read tools against the
# real modeled-information-format org (org-level packages have no sandbox
# equivalent). Uses the "release" App (the only one of this org's six Apps
# with a packages permission) purely to read, never to delete/restore a
# real published package.

"on":
  workflow_dispatch:
    inputs:
      reviewer_login:
        description: 'GitHub login to use for request_review/remove_review_request testing (optional; skips that check if omitted)'
        required: false
        type: string

permissions:
  contents: read

jobs:
  live-verify:
    name: live verify (github-sdlc-planning + github-pull-requests)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    env:
      SANDBOX_OWNER: modeled-information-format
      SANDBOX_REPO: gdlc-sandbox
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      - name: Mint the "issues" App installation token
        id: issues_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.ISSUES_CLIENT_APP_ID }}
          private-key: ${{ secrets.ISSUES_CLIENT_APP_PRIVATE_KEY }}
          owner: ${{ env.SANDBOX_OWNER }}
          repositories: ${{ env.SANDBOX_REPO }}

      - name: Create a throwaway Projects v2 board + a text field
        id: project
        env:
          GH_TOKEN: ${{ steps.issues_token.outputs.token }}
          RUN_TITLE: "verify-live ${{ github.run_id }}"
        run: |
          set -euo pipefail
          # shellcheck disable=SC2016  # GraphQL's own $variable syntax, not shell expansion — values are passed via -f, never interpolated into the query text.
          OWNER_ID=$(gh api graphql -f query='query($login:String!){organization(login:$login){id}}' \
            -f login="${SANDBOX_OWNER}" --jq '.data.organization.id')
          # shellcheck disable=SC2016
          PROJECT_JSON=$(gh api graphql -f query='
            mutation($ownerId:ID!, $title:String!) {
              createProjectV2(input: { ownerId: $ownerId, title: $title }) { projectV2 { id number } }
            }' -f ownerId="${OWNER_ID}" -f title="${RUN_TITLE}")
          PROJECT_ID=$(jq -r '.data.createProjectV2.projectV2.id' <<<"$PROJECT_JSON")
          PROJECT_NUMBER=$(jq -r '.data.createProjectV2.projectV2.number' <<<"$PROJECT_JSON")
          {
            echo "project_id=${PROJECT_ID}"
            echo "project_number=${PROJECT_NUMBER}"
          } >> "$GITHUB_OUTPUT"
          # shellcheck disable=SC2016
          FIELD_JSON=$(gh api graphql -f query='
            mutation($projectId:ID!) {
              createProjectV2Field(input: { projectId: $projectId, dataType: TEXT, name: "verify-live-text" }) {
                projectV2Field { ... on ProjectV2Field { id } }
              }
            }' -f projectId="${PROJECT_ID}")
          FIELD_ID=$(jq -r '.data.createProjectV2Field.projectV2Field.id' <<<"$FIELD_JSON")
          echo "field_id=${FIELD_ID}" >> "$GITHUB_OUTPUT"
          echo "Created project #${PROJECT_NUMBER} (${PROJECT_ID}), field ${FIELD_ID}"

      - name: Build github-sdlc-planning/mcp-server
        working-directory: plugins/github-sdlc-planning/mcp-server
        run: npm ci
      - name: Run github-sdlc-planning verify:live
        working-directory: plugins/github-sdlc-planning/mcp-server
        env:
          GITHUB_TOKEN: ${{ steps.issues_token.outputs.token }}
          SANDBOX_PROJECT_NUMBER: ${{ steps.project.outputs.project_number }}
          SANDBOX_PROJECT_TEXT_FIELD_ID: ${{ steps.project.outputs.field_id }}
        run: npm run verify:live

      - name: Build github-pull-requests/mcp-server
        working-directory: plugins/github-pull-requests/mcp-server
        run: npm ci
      - name: Run github-pull-requests verify:live
        working-directory: plugins/github-pull-requests/mcp-server
        env:
          GITHUB_TOKEN: ${{ steps.issues_token.outputs.token }}
          SANDBOX_REVIEWER_LOGIN: ${{ inputs.reviewer_login }}
        run: npm run verify:live

      - name: Delete the throwaway Projects v2 board
        if: always()
        env:
          GH_TOKEN: ${{ steps.issues_token.outputs.token }}
          PROJECT_ID: ${{ steps.project.outputs.project_id }}
          PROJECT_NUMBER: ${{ steps.project.outputs.project_number }}
        run: |
          # shellcheck disable=SC2016
          gh api graphql -f query='mutation($projectId:ID!){deleteProjectV2(input:{projectId:$projectId}){projectV2{id}}}' \
            -f projectId="${PROJECT_ID}" || echo "::warning::project cleanup failed, delete #${PROJECT_NUMBER} manually"

  live-verify-packages:
    name: live verify (github-packages)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'

      # organization-roles and repo-config's endpoints need no special
      # scope beyond default GITHUB_TOKEN read access, but the packages
      # API's read-only endpoints (GET /orgs/{org}/packages) reject a
      # token with no packages scope at all (verified: 403 "You need at
      # least read:packages scope"). The release App is the only one of
      # this org's six Apps with a packages permission (packages: write,
      # per auth/apps.json) -- reused here for read-only verification
      # rather than provisioning a new App.
      #
      # GET /orgs/{org}/packages is an org-wide listing, not scoped to any
      # one repo -- omitting `repositories:` grants the token access to
      # every repo the release App is installed on (install_on: all, per
      # auth/apps.json), which is what an org-wide read actually needs.
      # Scoping to a single repo here (as the sibling "issues" mint above
      # correctly does for its repo-scoped sandbox tools) would silently
      # narrow this job to that one repo's packages instead of the org's.
      # Down-scoped to read: this job only ever calls the plugin's four
      # read tools, never delete_package/restore_package, even though the
      # App's own permission ceiling is packages:write (same down-scoping
      # pattern as ontologies/.github/workflows/release.yml's
      # permission-contents: write).
      - name: Mint the "release" App installation token
        id: release_token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
        with:
          client-id: ${{ vars.RELEASE_CLIENT_APP_ID }}
          private-key: ${{ secrets.RELEASE_CLIENT_APP_PRIVATE_KEY }}
          owner: modeled-information-format
          permission-packages: read

      - name: Build github-packages/mcp-server
        working-directory: plugins/github-packages/mcp-server
        run: npm ci
      - name: Run github-packages verify:live
        working-directory: plugins/github-packages/mcp-server
        env:
          GITHUB_TOKEN: ${{ steps.release_token.outputs.token }}
          TARGET_ORG: modeled-information-format
        run: npm run verify:live
