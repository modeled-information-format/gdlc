---
name: CI

# Continuous integration: pin-check + workflow lint, thin callers of the
# central modeled-information-format/.github reusables (pinned by the
# .github repo's commit SHA, re-resolved 2026-07-03).

"on":
  push:
    branches: [main]
  # No branches filter: matches catalog-admission.yml's own convention, and
  # lets stacked PRs (base = another feature branch, not main) still get
  # pin-check and validate-workflows coverage. A PR targeting main behaves
  # exactly as before.
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Every `uses:` MUST be a full 40-char commit SHA; thin caller of the
  # central pin-check reusable (never reinvented).
  pin-check:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
  # Excludes *.lock.yml — gh-aw's compiler emits current GitHub Actions
  # features (e.g. concurrency.queue) that no released actionlint (through
  # 1.7.12, confirmed) recognizes yet; those files are linted by gh-aw's own
  # `gh aw lint` below instead, which understands its own generated output.
  # Update this list when a new hand-authored workflow is added.
  validate-workflows:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      files: >-
        .github/workflows/ci.yml .github/workflows/catalog-admission.yml
        .github/workflows/docker-publish.yml
        .github/workflows/live-integration-tests.yml
        .github/workflows/quality-gates.yml .github/workflows/release.yml
  gh-aw-lint:
    name: gh-aw-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up gh-aw
        uses: github/gh-aw-actions/setup@3fac1cfa7a5a375a6a5eb9839178f6dad7adb60a # v0.82.2
      - name: Lint gh-aw-generated workflows
        run: gh aw lint --dir .github/workflows

  # ADR-0007 (AD-4): github-sdlc-planning's hygiene-check.mjs/
  # hygiene-aggregate.mjs/lib is the canonical copy; github-pull-requests and
  # github-bug-capture each ship a byte-identical copy under their own
  # hooks/, since hook scripts in this plugin family run dependency-free (no
  # node_modules at hook-execution time) and have no shared-package import
  # path the way the MCP servers do. This is the load-bearing guard that
  # keeps that duplication from silently drifting.
  hygiene-hook-drift-check:
    name: hygiene-hook-drift-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Diff sibling copies against the canonical version
        run: |
          set -euo pipefail
          canon=plugins/github-sdlc-planning/hooks
          status=0
          for f in lib/hygiene-check.mjs lib/hygiene-scratch.mjs lib/hygiene-aggregate.mjs hygiene-check.mjs hygiene-aggregate.mjs; do
            for sibling in github-pull-requests github-bug-capture; do
              path="plugins/$sibling/hooks/$f"
              if [ ! -f "$path" ]; then
                echo "::error file=$path::missing — every sibling plugin must carry a copy of $f"
                status=1
                continue
              fi
              if ! diff -u "$canon/$f" "$path"; then
                echo "::error file=$path::drifted from $canon/$f — re-copy the canonical file verbatim"
                status=1
              fi
            done
          done
          exit "$status"

  # CLAUDE.local.md's "Version discipline" requires the catalog, each
  # plugin.json, each mcp-server/package.json, and each server's
  # new McpServer({version}) string to agree. catalog-admission only checks
  # marketplace.json against plugin.json; release.yml's manifest check only
  # fires on a tag push. Neither ever looks at package-lock.json or
  # src/index.ts, which is exactly how all 7 McpServer version strings went
  # stale at 0.6.0 for three releases (0.7.0, 0.7.1) unnoticed — this job
  # closes that gap on every PR, not just at tag time (issue #190).
  version-consistency-check:
    name: version-consistency-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Every version-bearing location must agree, per plugin
        run: |
          # No `set -e`: a single malformed JSON file or an unmatched
          # src/index.ts regex must degrade to a clear per-plugin ::error::,
          # not abort the whole job mid-loop (which would silently skip
          # every plugin after the one that tripped it).
          set -uo pipefail
          status=0
          for dir in plugins/*/; do
            name="$(basename "$dir")"
            pj="${dir}.claude-plugin/plugin.json"
            pkg="${dir}mcp-server/package.json"
            lock="${dir}mcp-server/package-lock.json"
            idx="${dir}mcp-server/src/index.ts"
            dist="${dir}mcp-server/dist/index.js"
            missing=0
            for f in "$pj" "$pkg" "$lock" "$idx" "$dist"; do
              if [ ! -f "$f" ]; then
                echo "::error file=$f::missing — every plugin must carry this file"
                missing=1
              fi
            done
            if [ "$missing" -eq 1 ]; then
              status=1
              continue
            fi

            v_plugin="$(jq -r '.version // "<missing>"' "$pj" 2>/dev/null || echo '<unparseable>')"
            v_pkg="$(jq -r '.version // "<missing>"' "$pkg" 2>/dev/null || echo '<unparseable>')"
            v_lock_top="$(jq -r '.version // "<missing>"' "$lock" 2>/dev/null || echo '<unparseable>')"
            v_lock_self="$(jq -r '.packages[""].version // "<missing>"' "$lock" 2>/dev/null || echo '<unparseable>')"
            # Anchored to the `new McpServer(` line itself, not just any
            # `version:` occurrence — dist/index.js in particular bundles
            # vendored deps with their own unrelated `version:` literals
            # (e.g. zod's `${def.version}`) that a bare grep would match
            # first.
            v_idx="$(grep -oE "new McpServer\([^)]*version: '[^']*'" "$idx" 2>/dev/null | head -1 | grep -oE "version: '[^']*'" | sed -E "s/version: '([^']*)'/\1/")"
            v_idx="${v_idx:-<none found>}"
            # dist/index.js is the esbuild bundle Claude Code actually loads
            # (.mcp.json points at dist/, never src/) — quotes are
            # normalized to double quotes by the bundler, unlike the
            # single-quoted source. Checking src/index.ts alone would pass
            # even if a contributor bumped the source but forgot to rebuild.
            v_dist="$(grep -oE 'new McpServer\([^)]*version: "[^"]*"' "$dist" 2>/dev/null | head -1 | grep -oE 'version: "[^"]*"' | sed -E 's/version: "([^"]*)"/\1/')"
            v_dist="${v_dist:-<none found>}"
            v_mp="$(jq -r --arg n "$name" 'first(.plugins[] | select(.name == $n) | .version) // "<no entry>"' .claude-plugin/marketplace.json 2>/dev/null || echo '<unparseable>')"

            uniq_count="$(printf '%s\n' "$v_plugin" "$v_pkg" "$v_lock_top" "$v_lock_self" "$v_idx" "$v_dist" "$v_mp" | sort -u | wc -l)"
            if [ "$uniq_count" -ne 1 ]; then
              echo "::error::${name} version mismatch — plugin.json=${v_plugin} package.json=${v_pkg} package-lock.json(top)=${v_lock_top} package-lock.json(self)=${v_lock_self} src/index.ts=${v_idx} dist/index.js=${v_dist} marketplace.json=${v_mp}"
              status=1
            else
              echo "${name}: OK (${v_plugin})"
            fi
          done
          exit "$status"

  # ADR-0009 / Story #264: catches a schema-invalid .config/gdlc/config.yml
  # (this repo's own dogfooded file, or any test fixture under a plugin's
  # test tree) before merge — the same validator write_gdlc_config uses
  # (GDLC_CONFIG_SECTION_SCHEMAS), invoked via the already-committed,
  # self-contained dist/validate-gdlc-config.js bundle (no npm ci/build
  # needed here; quality-gates.yml's own dist-freshness check is what keeps
  # that bundle honest). Closes the exact gap that let #247/#248's
  # schema/loader drift land unnoticed.
  gdlc-config-validate:
    name: gdlc-config-validate
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up Node (24)
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24'
      - name: Validate every .config/gdlc/config.yml against the schema
        run: |
          set -uo pipefail
          status=0
          validator=plugins/github-sdlc-planning/mcp-server/dist/validate-gdlc-config.js
          if [ ! -f "$validator" ]; then
            echo "::error file=$validator::missing — run 'npm run build' in plugins/github-sdlc-planning/mcp-server and commit dist/"
            exit 1
          fi
          found=0
          while IFS= read -r -d '' f; do
            found=1
            echo "Validating $f"
            if ! node "$validator" "$f"; then
              echo "::error file=$f::failed schema validation against schema/gdlc-config.schema.json"
              status=1
            fi
          done < <(find . -path './node_modules' -prune -o -path '*/node_modules' -prune -o -path '*/.config/gdlc/config.yml' -print0)
          if [ "$found" -eq 0 ]; then
            echo "No .config/gdlc/config.yml files found — nothing to validate."
          fi
          exit "$status"

  # Issue #272 (agents/*.md `tools:`) and issue #277 (skills/*/SKILL.md
  # `allowed-tools:`): both frontmatter keys granted only the bare
  # `mcp__github-sdlc-planning__*` form. Per the precedent already
  # established for this exact class of bug (CHANGELOG [0.7.1], PR
  # #177/#178, docs/github-sdlc-planning/explanation/architecture.md,
  # plugins/github-sdlc-planning/hooks/lib/mcp-tool-name.mjs), a
  # self-vendored plugin's MCP tools are legitimately exposed under EITHER
  # name depending on install topology: the bare form
  # (`mcp__<plugin>__<action>`) for a directly-registered MCP server, or the
  # plugin-qualified form (`mcp__plugin_<marketplace>_<plugin>__<action>`)
  # for a marketplace install. A static `tools:`/`allowed-tools:` grant has
  # to list both to work under either topology — granting only one silently
  # zeroes out an agent's tools under the other (#272) or, for a skill's
  # `allowed-tools:` permission-allowlist, leaves the affected MCP calls
  # falling back to a permission prompt instead of auto-approving under the
  # other topology (#277 -- a real but lower-severity failure mode, since
  # `allowed-tools:` is an approval allowlist rather than a hard capability
  # restriction the way an agent's `tools:` is). This job checks, for every
  # self-vendored plugin referenced by name in any agents/*.md `tools:` line
  # or skills/*/SKILL.md `allowed-tools:` line, that both forms are present
  # together. It intentionally does not check externally-referenced plugins
  # (e.g. mif-docs) since this repo can't authoritatively verify another
  # repo's real MCP server name.
  agent-tools-glob-check:
    name: agent-tools-glob-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Self-vendored plugin MCP tool globs must grant both install-topology forms
        run: |
          set -uo pipefail
          status=0
          known_plugins=()
          for d in plugins/*/; do
            known_plugins+=("$(basename "$d")")
          done
          check_file() {
            local f="$1" field="$2"
            local tools_line
            tools_line="$(grep -m1 "^${field}:" "$f" || true)"
            [ -z "$tools_line" ] && return
            for p in "${known_plugins[@]}"; do
              local bare="mcp__${p}__"
              local qual="mcp__plugin_${p}_${p}__"
              local has_bare=0 has_qual=0
              grep -qF -- "$bare" <<<"$tools_line" && has_bare=1
              grep -qF -- "$qual" <<<"$tools_line" && has_qual=1
              if { [ "$has_bare" -eq 1 ] || [ "$has_qual" -eq 1 ]; } && { [ "$has_bare" -ne 1 ] || [ "$has_qual" -ne 1 ]; }; then
                echo "::error file=$f::references plugin '$p' MCP tools with only one of the two valid install-topology forms (bare present=$has_bare, plugin-qualified present=$has_qual) — grant both ${bare}* and ${qual}* so it works whether this plugin is directly registered or marketplace-installed"
                status=1
              fi
            done
          }
          while IFS= read -r -d '' f; do
            check_file "$f" "tools"
          done < <(find plugins -path '*/agents/*.md' -print0)
          while IFS= read -r -d '' f; do
            check_file "$f" "allowed-tools"
          done < <(find plugins -path '*/skills/*/SKILL.md' -print0)
          exit "$status"
