---
name: CI

# Continuous integration: pin-check + workflow lint, thin callers of the
# central modeled-information-format/.github reusables (pinned by the
# .github repo's commit SHA, re-resolved 2026-07-03).

"on":
  push:
    branches: [main]
  # No branches filter: matches catalog-admission.yml's own convention, and
  # lets stacked PRs (base = another feature branch, not main) still get
  # pin-check and validate-workflows coverage. A PR targeting main behaves
  # exactly as before.
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # Every `uses:` MUST be a full 40-char commit SHA; thin caller of the
  # central pin-check reusable (never reinvented).
  pin-check:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/pin-check.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
  # Excludes *.lock.yml — gh-aw's compiler emits current GitHub Actions
  # features (e.g. concurrency.queue) that no released actionlint (through
  # 1.7.12, confirmed) recognizes yet; those files are linted by gh-aw's own
  # `gh aw lint` below instead, which understands its own generated output.
  # Update this list when a new hand-authored workflow is added.
  validate-workflows:
    permissions:
      contents: read
    uses: >-
      modeled-information-format/.github/.github/workflows/reusable-actionlint.yml@7c56346c4bc47b15f08d44889116486583a1a7ac
    with:
      files: >-
        .github/workflows/ci.yml .github/workflows/catalog-admission.yml
        .github/workflows/docker-publish.yml
        .github/workflows/live-integration-tests.yml
        .github/workflows/quality-gates.yml .github/workflows/release.yml
  gh-aw-lint:
    name: gh-aw-lint
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Set up gh-aw
        uses: github/gh-aw-actions/setup@3fac1cfa7a5a375a6a5eb9839178f6dad7adb60a # v0.82.2
      - name: Lint gh-aw-generated workflows
        run: gh aw lint --dir .github/workflows

  # ADR-0007 (AD-4): github-sdlc-planning's hygiene-check.mjs/
  # hygiene-aggregate.mjs/lib is the canonical copy; github-pull-requests and
  # github-bug-capture each ship a byte-identical copy under their own
  # hooks/, since hook scripts in this plugin family run dependency-free (no
  # node_modules at hook-execution time) and have no shared-package import
  # path the way the MCP servers do. This is the load-bearing guard that
  # keeps that duplication from silently drifting.
  hygiene-hook-drift-check:
    name: hygiene-hook-drift-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Diff sibling copies against the canonical version
        run: |
          set -euo pipefail
          canon=plugins/github-sdlc-planning/hooks
          status=0
          for f in lib/hygiene-check.mjs lib/hygiene-scratch.mjs lib/hygiene-aggregate.mjs hygiene-check.mjs hygiene-aggregate.mjs; do
            for sibling in github-pull-requests github-bug-capture; do
              path="plugins/$sibling/hooks/$f"
              if [ ! -f "$path" ]; then
                echo "::error file=$path::missing — every sibling plugin must carry a copy of $f"
                status=1
                continue
              fi
              if ! diff -u "$canon/$f" "$path"; then
                echo "::error file=$path::drifted from $canon/$f — re-copy the canonical file verbatim"
                status=1
              fi
            done
          done
          exit "$status"

  # gdlc#190: every release bump touches plugin.json, mcp-server/package.json,
  # marketplace.json's per-plugin entry, and the McpServer({version}) string
  # in mcp-server/src/index.ts, in lockstep, by hand -- and the McpServer
  # string specifically went stale for three releases (0.6.0 while everything
  # else moved 0.7.0 -> 0.7.1) with no gate catching it, only found by manual
  # grep. This job is that gate: fails the build the moment any of the four
  # locations disagrees for any of the seven vendored plugins, so this
  # specific drift cannot silently reoccur the way it already did once.
  version-consistency-check:
    name: version-consistency-check
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Assert plugin.json / package.json / McpServer version / marketplace.json all agree, per plugin
        run: |
          set -euo pipefail
          status=0
          for dir in plugins/*/; do
            plugin="$(basename "$dir")"
            plugin_json="plugins/$plugin/.claude-plugin/plugin.json"
            pkg_json="plugins/$plugin/mcp-server/package.json"
            index_ts="plugins/$plugin/mcp-server/src/index.ts"
            [ -f "$plugin_json" ] || continue
            [ -f "$pkg_json" ] || continue
            plugin_version="$(jq -r '.version' "$plugin_json")"
            pkg_version="$(jq -r '.version' "$pkg_json")"
            if [ "$plugin_version" != "$pkg_version" ]; then
              echo "::error file=$pkg_json::package.json version ($pkg_version) != plugin.json version ($plugin_version)"
              status=1
            fi
            if [ -f "$index_ts" ]; then
              server_version="$(grep -oE "new McpServer\(\{[^}]*version: '[0-9]+\.[0-9]+\.[0-9]+'" "$index_ts" | grep -oE "[0-9]+\.[0-9]+\.[0-9]+" || true)"
              if [ -z "$server_version" ]; then
                echo "::error file=$index_ts::no McpServer({version: '...'}) string found"
                status=1
              elif [ "$server_version" != "$plugin_version" ]; then
                echo "::error file=$index_ts::McpServer version string ($server_version) != plugin.json version ($plugin_version)"
                status=1
              fi
            fi
            marketplace_version="$(jq -r --arg name "$plugin" '.plugins[] | select(.name == $name) | .version' .claude-plugin/marketplace.json)"
            if [ -z "$marketplace_version" ]; then
              echo "::error file=.claude-plugin/marketplace.json::no entry for plugin $plugin"
              status=1
            elif [ "$marketplace_version" != "$plugin_version" ]; then
              echo "::error file=.claude-plugin/marketplace.json::marketplace version ($marketplace_version) for $plugin != plugin.json version ($plugin_version)"
              status=1
            fi
          done
          exit "$status"
